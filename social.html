<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κοινωνικό Έργο — Κ.Ο. Καλαμαριάς</title>

  <meta property="og:image" content="https://www.kokalamarias.gr/images/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="el_GR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Κοινωνικό Έργο — Κ.Ο. Καλαμαριάς" />
  <meta name="twitter:description" content="Το κοινωνικό έργο του Κ.Ο. Καλαμαριάς — Safe Water Sports, σχολικές επισκέψεις, οικογένεια Κ.Ο.Κ." />
  <meta name="twitter:image" content="https://www.kokalamarias.gr/images/og-image.jpg" />
  <link rel="canonical" href="https://www.kokalamarias.gr/social" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body data-page="social">

  <div id="site-nav"></div>

  <section class="page-hero">
    <div class="container">
      <span class="page-hero-tag" data-i18n="social.tag">Κοινωνικό Έργο</span>
      <h1 data-i18n="social.title">Πέρα από την Πισίνα</h1>
      <p data-i18n="social.subtitle">Επιστρέφουμε στην κοινωνία όσα μας έδωσε</p>
    </div>
  </section>

  <section class="section section-blue">
    <div class="container">
      <div class="social-grid">
        <div class="social-card">
          <div class="social-icon"><i class="fas fa-life-ring"></i></div>
          <h3 data-i18n="social.s1_title">Safe Water Sports</h3>
          <p data-i18n="social.s1_p"></p>
        </div>
        <div class="social-card">
          <div class="social-icon"><i class="fas fa-hand-holding-heart"></i></div>
          <h3 data-i18n="social.s2_title">Κοινωνικές Ευαισθησίες</h3>
          <p data-i18n="social.s2_p"></p>
        </div>
        <div class="social-card">
          <div class="social-icon"><i class="fas fa-school"></i></div>
          <h3 data-i18n="social.s3_title">Σχολικές Επισκέψεις</h3>
          <p data-i18n="social.s3_p"></p>
        </div>
        <div class="social-card">
          <div class="social-icon"><i class="fas fa-users"></i></div>
          <h3 data-i18n="social.s4_title">Οικογένεια Κ.Ο.Κ.</h3>
          <p data-i18n="social.s4_p"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Δράσεις (Άρθρα) — δυναμικά από content/data/social.json -->
  <section class="section">
    <div class="container">
      <div class="section-header">
        <span class="section-tag" data-i18n="social.actions_tag">Δράσεις μας</span>
        <h2 data-i18n="social.actions_title">Πρόσφατες Κοινωνικές Δράσεις</h2>
        <p data-i18n="social.actions_subtitle">Όλες οι ενέργειες κοινωνικής ευαισθητοποίησης του ομίλου</p>
      </div>
      <div class="news-grid" id="socialNewsGrid">
        <!-- δυναμικά γεμίζει από social-news-loader.js -->
      </div>
    </div>
  </section>

  <!-- WAVE DIVIDER → Footer transition -->
  <div class="wave-divider">
    <img src="images/06-wave-divider-1920x220.png" alt="" aria-hidden="true" />
  </div>

  <div id="site-footer"></div>
  <script src="translations.js"></script>
  <script src="partials.js"></script>
  <script src="site-loader.js"></script>
  <script src="script.js"></script>
  <script src="social-news-loader.js"></script>
</body>
</html>
