<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />

  <meta name="twitter:description" content="Τμήματα κολύμβησης για όλες τις ηλικίες — από εκμάθηση έως αγωνιστικό τμήμα Τεχνικής Κολύμβησης." />

  <link rel="canonical" href="https://www.kokalamarias.gr/teams" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

</head>
<body data-page="teams">

  <div id="site-nav"></div>

  <section class="page-hero">
    <div class="container">
      <span class="page-hero-tag" data-i18n="teams.tag">Τμήματα &amp; Ακαδημίες</span>
      <h1 data-i18n="teams.title">Πυραμίδα Ανάπτυξης</h1>
      <p data-i18n="teams.subtitle">Από τα πρώτα βήματα στο νερό ώς το διεθνές βάθρο</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="programs-grid">
        <a href="#t1" class="program-card-link" id="t1">
          <img src="images/04a-program-ekmathisi.png" alt="Επίπεδο 01 — Εκμάθηση (4-7 ετών)" class="lang-only-el" />
          <img src="images/en/04a-program-learn-to-swim.png" alt="Level 01 — Learn to Swim (Ages 4-7)" class="lang-only-en" />
        </a>
        <a href="#t2" class="program-card-link" id="t2">
          <img src="images/04b-program-akadimia.png" alt="Επίπεδο 02 — Ακαδημία (7-9 ετών)" class="lang-only-el" />
          <img src="images/en/04b-program-academy.png" alt="Level 02 — Academy (Ages 7-9)" class="lang-only-en" />
        </a>
        <a href="#t3" class="program-card-link" id="t3">
          <img src="images/04c-program-proagonistiko.png" alt="Επίπεδο 03 — Προαγωνιστικό (9-12 ετών)" class="lang-only-el" />
          <img src="images/en/04c-program-pre-competitive.png" alt="Level 03 — Pre-Competitive (Ages 9-12)" class="lang-only-en" />
        </a>
        <a href="#t4" class="program-card-link" id="t4">
          <img src="images/04d-program-agonistiko.png" alt="Επίπεδο 04 — Αγωνιστικό &amp; Τεχνική (12+ ετών)" class="lang-only-el" />
          <img src="images/en/04d-program-competitive.png" alt="Level 04 — Competitive &amp; Finswimming (Ages 12+)" class="lang-only-en" />
        </a>
      </div>
    </div>
  </section>

  <!-- COASTAL ROWING -->
  <section class="section section-alt coastal-section">
    <div class="container">
      <a href="https://www.coastalrowingclub.gr/" target="_blank" rel="noopener" class="coastal-banner-link">
        <img src="images/05-coastal-rowing-1600x700.png" alt="Νέο Τμήμα — Παράκτια Κωπηλασία" class="coastal-banner-img lang-only-el" />
        <img src="images/en/05-coastal-rowing.png" alt="New Division — Coastal Rowing" class="coastal-banner-img lang-only-en" />
        <div class="coastal-overlay-cta">
          <span data-i18n="coastal.cta">Επισκεφθείτε το coastalrowingclub.gr</span> <i class="fas fa-external-link-alt"></i>
        </div>
      </a>
      <p class="coastal-note" data-i18n="coastal.p" data-i18n-html></p>
    </div>
  </section>

  <!-- WAVE DIVIDER → Footer transition -->
  <div class="wave-divider">
    <img src="images/06-wave-divider-1920x220.png" alt="" aria-hidden="true" />
  </div>

  <div id="site-footer"></div>
  <script src="translations.js"></script>
  <script src="partials.js"></script>
  <script src="site-loader.js"></script>
  <script src="script.js"></script>
  <script src="teams-loader.js"></script>
