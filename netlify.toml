# Netlify configuration για το Κ.Ο. Καλαμαριάς
# Δεν χρειάζεται build (στατικό site)

[build]
  publish = "."

# Καθαρές URLs χωρίς .html
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache για εικόνες
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# No-cache για content JSON (ώστε ενημερώσεις CMS να εμφανίζονται αμέσως)
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
